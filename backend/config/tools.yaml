version: "1.0"

servers:
  zotero:
    transport: stdio
    command: "python"
    args: ["-m", "src.infrastructure.tools.zotero_mcp_server"]
    env:
      ZOTERO_API_KEY: "${ZOTERO_API_KEY}"
    enabled: false

tools:
  academic_read:
    transport: internal
    module: "src.infrastructure.tools.academic_io"
    attribute: "academic_read"
    enabled: true

  academic_export:
    transport: internal
    module: "src.infrastructure.tools.academic_io"
    attribute: "academic_export"
    enabled: true

  scholar_search:
    transport: internal
    module: "src.infrastructure.tools.academic_tools"
    attribute: "scholar_search"
    enabled: true

  paper_fetch:
    transport: internal
    module: "src.infrastructure.tools.academic_tools"
    attribute: "paper_fetch"
    enabled: true

  pdf_structured_extract:
    transport: internal
    module: "src.infrastructure.tools.academic_tools"
    attribute: "pdf_structured_extract"
    enabled: true

  citation_graph:
    transport: internal
    module: "src.infrastructure.tools.academic_tools"
    attribute: "citation_graph"
    enabled: true

  claim_grounding_check:
    transport: internal
    module: "src.infrastructure.tools.academic_tools"
    attribute: "claim_grounding_check"
    enabled: true

  bib_manager:
    transport: internal
    module: "src.infrastructure.tools.academic_tools"
    attribute: "bib_manager"
    enabled: true
