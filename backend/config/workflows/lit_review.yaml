id: lit_review_v1
description: >
  End-to-end literature review workflow from planning through export.
  It supports one revise loop driven by critic decisions on evidence or writing quality.
input_requirements:
  - input.user_text
  - artifacts.*
entry_node: planner
nodes:
  planner:
    type: agent
    agent_id: planner_academic
  search:
    type: agent
    agent_id: search_scholar
  read:
    type: agent
    agent_id: reader_extractor
  write:
    type: agent
    agent_id: writer_academic
  critic:
    type: agent
    agent_id: critic_academic
  export:
    type: agent
    agent_id: report_exporter
  end:
    type: terminal
edges:
  - from: planner
    to: search
  - from: search
    to: read
  - from: read
    to: write
  - from: write
    to: critic
  - from: critic
    to: export
    condition:
      field: artifacts.quality_report.decision
      equals: approve
  - from: export
    to: end
  - from: critic
    to: search
    condition:
      field: artifacts.quality_report.decision
      equals: revise_evidence
  - from: critic
    to: write
    condition:
      field: artifacts.quality_report.decision
      equals: revise_writing
limits:
  max_loops: 1
  max_node_tool_search__scholar_search: 2
  max_node_tool_read__paper_fetch: 2
