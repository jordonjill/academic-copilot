id: proposal_v2
name: Proposal v2
entry_node: planner
nodes:
  planner:
    type: agent
    agent_id: planner
  researcher:
    type: agent
    agent_id: researcher
  synthesizer:
    type: agent
    agent_id: synthesizer
  critic:
    type: agent
    agent_id: critic
  reporter:
    type: agent
    agent_id: reporter
  end:
    type: terminal
edges:
  - from: planner
    to: researcher
    condition:
      field: artifacts.research_plan.step_type
      equals: search
  - from: planner
    to: synthesizer
    condition:
      field: artifacts.research_plan.step_type
      equals: synthesize
  - from: researcher
    to: planner
  - from: synthesizer
    to: critic
  - from: critic
    to: reporter
    condition:
      field: artifacts.research_critic.is_valid
      equals: true
  - from: critic
    to: synthesizer
    condition:
      field: artifacts.research_critic.is_valid
      equals: false
  - from: reporter
    to: end
limits:
  max_steps: 20
  max_loops: 4
  timeout_ms: 600000
