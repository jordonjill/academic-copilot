id: proposal_v2
name: Proposal Workflow v3 (Evidence-Driven)
entry_node: planner
nodes:
  planner:
    type: agent
    agent_id: planner_academic
  search:
    type: agent
    agent_id: search_scholar
  read:
    type: agent
    agent_id: reader_extractor
  gap:
    type: agent
    agent_id: gap_hypothesis
  method:
    type: agent
    agent_id: method_designer
  experiment:
    type: agent
    agent_id: experiment_designer
  write:
    type: agent
    agent_id: writer_academic
  critic:
    type: agent
    agent_id: critic_academic
  export:
    type: agent
    agent_id: report_exporter
  end:
    type: terminal
edges:
  - from: planner
    to: search
  - from: search
    to: read
  - from: read
    to: gap
  - from: gap
    to: method
  - from: method
    to: experiment
  - from: experiment
    to: write
  - from: write
    to: critic
  - from: critic
    to: export
    condition:
      field: artifacts.quality_report.decision
      equals: approve
  - from: export
    to: end
  - from: critic
    to: search
    condition:
      field: artifacts.quality_report.decision
      equals: revise_evidence
  - from: critic
    to: method
    condition:
      field: artifacts.quality_report.decision
      equals: revise_method
  - from: critic
    to: write
    condition:
      field: artifacts.quality_report.decision
      equals: revise_writing
limits:
  max_loops: 1
  max_node_tool_search__scholar_search: 2
  max_node_tool_read__paper_fetch: 2
